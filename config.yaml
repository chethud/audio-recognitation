# ALM / ALM-Lite Configuration

# SQLite is the default database: data/alm.db (tables: inferences, analyze_logs, users, …)

project:
  name: alm-audio-language-model
  output_dir: outputs
  seed: 42

data:
  train_split: 0.9
  sample_rate: 16000
  max_audio_length_sec: 15   # shorter clip = faster; 0 = full file (slow)
  train_json: data/train.jsonl
  val_json: data/val.jsonl

# --- ALM-Lite (Modular) pipeline: ASR + SED + Context + LLM ---
alm_lite:
  fast_mode: true   # true = ASR only + instant answer (seconds on CPU); false = full SED + LLM (slow)
  asr:
    model_id: "openai/whisper-tiny"   # fastest; use whisper-small for better accuracy
    language: null   # e.g. "en" skips auto-detect and speeds up Whisper
  sed:
    enabled: false   # AST model is heavy on CPU; enable with fast_mode: false
    model_id: "MIT/ast-finetuned-audioset-10-10-0.4593"
    top_k: 3
    threshold: 0.3
  emotion:
    enabled: false
    model_id: "ehcalabres/wav2vec2-lg-xlsr-en-speech-emotion-recognition"
  llm:
    enabled: false   # Qwen is slow on CPU; enable with fast_mode: false
    model_id: "Qwen/Qwen2-0.5B-Instruct"
    max_new_tokens: 48
    repetition_penalty: 1.1
    no_repeat_ngram_size: 3

training:
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2e-5
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  use_cpu: true  # set false for GPU (needs ~8GB+ VRAM)

# Optional CNN checkpoints (train with `python -m training.train_sed` / `train_emotion`)
# Sound: ESC-50 as manageable AudioSet-style subset -> outputs/sed_cnn.pt
# Emotion: RAVDESS Speech -> outputs/emotion_cnn.pt
alm_cnn:
  sed_checkpoint: outputs/sed_cnn.pt
  emotion_checkpoint: outputs/emotion_cnn.pt
  merged_checkpoint: outputs/alm_cnn_merged.pt
  sed_metrics_json: outputs/sed_metrics.json
  emotion_metrics_json: outputs/emotion_metrics.json
  merged_metrics_json: outputs/alm_cnn_merged_metrics.json
