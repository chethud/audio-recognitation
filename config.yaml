# ALM / ALM-Lite Configuration

# SQLite is the default database: data/alm.db (tables: inferences, analyze_logs, users, …)

project:
  name: alm-audio-language-model
  output_dir: outputs
  seed: 42

data:
  train_split: 0.9
  sample_rate: 16000
  max_audio_length_sec: 0   # 0 = full file; set e.g. 30 to cap analysis length
  train_json: data/train.jsonl
  val_json: data/val.jsonl

# --- ALM-Lite: full AI pipeline (ASR + SED + emotion + LLM), speed-optimized ---
alm_lite:
  fast_mode: true   # ASR-only locally — full stack needs more RAM/page file
  store_uploaded_audio: false
  asr:
    model_id: "openai/whisper-base"   # much better for Kannada/Indic; use tiny only for speed tests
    language: null   # auto-detect
    segment_sec: 30
    max_segments: 1   # 1 = Whisper long-form chunking on full audio
  diarization:
    enabled: true   # label speech as Person 1, Person 2, … when multiple speakers
    max_speakers: 6
    window_sec: 1.5
    hop_sec: 1.0     # larger hop = fewer embedding windows (faster)
    min_segment_sec: 0.5
    distance_threshold: 0.55
    max_audio_sec: 0   # 0 = diarize full clip; set e.g. 300 to cap for speed
  sed:
    enabled: true
    backend: hybrid   # cnn + AST AudioSet (dog bark, phone ring, car horn, …)
    model_id: "MIT/ast-finetuned-audioset-10-10-0.4593"
    top_k: 10
    threshold: 0.04   # lower = more background sounds detected
    segment_sec: 2.5
    max_windows: 12    # evenly spaced windows across full clip; 0 = auto
    max_results: 12
  emotion:
    enabled: true
    backend: cnn   # lightweight local CNN when checkpoints exist
    model_id: "ehcalabres/wav2vec2-lg-xlsr-en-speech-emotion-recognition"
  llm:
    enabled: true
    model_id: "Qwen/Qwen2-0.5B-Instruct"
    max_new_tokens: 32
    repetition_penalty: 1.1
    no_repeat_ngram_size: 2

training:
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2e-5
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  use_cpu: true

alm_cnn:
  use_in_inference: auto   # auto | true | false — load outputs/alm_cnn_merged.pt when present
  sed_checkpoint: outputs/sed_cnn.pt
  emotion_checkpoint: outputs/emotion_cnn.pt
  merged_checkpoint: outputs/alm_cnn_merged.pt
  sed_metrics_json: outputs/sed_metrics.json
  emotion_metrics_json: outputs/emotion_metrics.json
  merged_metrics_json: outputs/alm_cnn_merged_metrics.json
